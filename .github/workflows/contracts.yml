name: contracts-gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate generated indexes
        run: python tools/codegen/regenerate_all.py

      - name: Run ledger index manifest check
        run: python tools/checks/ledger_index_manifest.py

      - name: Run ledger alignment check
        run: python tools/checks/check_ledger_alignment.py

      - name: Run cross-file consistency check
        run: python tools/checks/check_consistency.py

      - name: Run version consistency check
        run: python tools/checks/check_versions.py

      - name: Run structure completeness check
        run: python tools/checks/check_structure.py

      - name: Run scaffold layout check
        run: python tools/checks/check_scaffold.py

      - name: Run public docs alignment check
        run: python tools/checks/check_public_docs.py

      - name: Run naming lint
        run: python tools/lint/check_naming.py

      - name: Run contract tests
        run: python -m unittest discover -s tests/contracts -p 'test_*.py' -v

      - name: Run tooling smoke check
        run: python tools/checks/check_tooling_smoke.py

      - name: Run generated sync check
        run: python tools/checks/check_generated_sync.py